<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Citymitra</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-subtle login-page">
    <div class="login-container">
        <!-- Back to Home -->
        <a href="index.html" class="back-link">
            <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m12 19-7-7 7-7"></path>
                <path d="M19 12H5"></path>
            </svg>
            Back to Home
        </a>

        <div class="login-card">
            <div class="card">
                <div class="card-header login-header">
                    <div class="login-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">
                        Sign in to your Citymitra account to report and track issues
                    </p>
                </div>

                <div class="card-content">
                    <form id="loginForm" class="login-form">
                        <div class="user-type-selector">
                            <button type="button" class="user-type-btn active" data-type="user">User</button>
                            <button type="button" class="user-type-btn" data-type="admin">Admin</button>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <circle cx="12" cy="16" r="1"></circle>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="form-options">
                            <div class="checkbox-group">
                                <input type="checkbox" id="remember" name="remember" class="checkbox">
                                <label for="remember" class="checkbox-label">Remember me</label>
                            </div>
                            <a href="#" class="forgot-password">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-hero btn-full">Sign In</button>
                    </form>

                    <div class="divider">
                        <span class="divider-text">or</span>
                    </div>

                    <div class="signup-link">
                        Don't have an account? 
                        <a href="signup.html" class="link-primary">Create one here</a>
                    </div>
                </div>
            </div>

            <div class="terms-notice">
                By signing in, you agree to our 
                <a href="#" class="link-primary">Terms of Service</a>
                and 
                <a href="#" class="link-primary">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
